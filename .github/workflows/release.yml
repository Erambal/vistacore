name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Create keystore.properties
        run: |
          printf 'storeFile=keystore.jks\n' > keystore.properties
          printf 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}\n' >> keystore.properties
          printf 'keyAlias=${{ secrets.KEY_ALIAS }}\n' >> keystore.properties
          printf 'keyPassword=${{ secrets.KEY_PASSWORD }}\n' >> keystore.properties

      - name: Build release APKs
        run: gradle assembleModernRelease assembleLegacyRelease --stacktrace

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/modern/release/app-modern-release.apk vistacore-${{ github.ref_name }}a.apk
          mv app/build/outputs/apk/legacy/release/app-legacy-release.apk vistacore-${{ github.ref_name }}b.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vistacore-${{ github.ref_name }}a.apk
            vistacore-${{ github.ref_name }}b.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
